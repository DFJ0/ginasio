<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>GYM Split</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeece9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9e9e99;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --green: #2d6a1f;
    --green-bg: #eaf3de;
    --red: #8b2020;
    --accent: #1a1a18;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131312;
      --bg2: #1e1e1c;
      --bg3: #272725;
      --text: #f0ede8;
      --text2: #9a9a95;
      --text3: #666662;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --green: #7bc462;
      --green-bg: #1a2e14;
      --red: #e07070;
      --accent: #f0ede8;
    }
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 10px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
  .header-date { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    padding: 10px 20px;
    gap: 8px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    overflow-x: auto;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 22px;
    border: 0.5px solid var(--border2);
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    min-height: 36px;
  }
  .day-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* SESSION BAR */
  .session-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .session-info { font-size: 12px; color: var(--text2); }
  .session-info strong { color: var(--text); font-weight: 500; }
  .log-btn {
    padding: 8px 18px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    min-height: 36px;
    transition: opacity 0.15s;
  }
  .log-btn:active { opacity: 0.7; }

  /* SCROLL AREA */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  /* GROUP HEADER */
  .group-header {
    padding: 10px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
  }

  /* EXERCISE ROW */
  .exercise-row {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    gap: 12px;
    background: var(--bg);
    min-height: 70px;
  }
  .exercise-row.is-done { background: var(--bg2); }

  .check-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .check-btn.done {
    background: var(--green-bg);
    border-color: var(--green);
  }
  .check-icon { display: none; }
  .check-btn.done .check-icon { display: block; }
  .check-circle { display: block; }
  .check-btn.done .check-circle { display: none; }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ex-prev {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .badge-up { color: var(--green); font-size: 10px; font-weight: 600; }
  .badge-down { color: var(--red); font-size: 10px; font-weight: 600; }

  /* WEIGHT CONTROL */
  .weight-ctrl {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .w-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-size: 20px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .w-btn:active { background: var(--bg3); }
  .weight-val {
    min-width: 48px;
    text-align: center;
  }
  .weight-num { font-size: 15px; font-weight: 600; color: var(--text); display: block; }
  .weight-unit { font-size: 10px; color: var(--text3); }
  .bodyweight-label { font-size: 11px; color: var(--text3); min-width: 48px; text-align: center; }

  /* HISTORY SECTION */
  .history-wrap {
    margin: 16px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .history-title {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.3px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
  }
  .hist-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    gap: 8px;
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-name { font-size: 12px; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-vals { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .hist-w { font-size: 12px; font-weight: 500; color: var(--text); }
  .hist-w.improved { color: var(--green); }
  .hist-arrow { font-size: 10px; color: var(--text3); }
  .hist-empty { padding: 24px 16px; text-align: center; font-size: 13px; color: var(--text3); }

  .bottom-space { height: 20px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 500px;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
  .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 24px; }
  .modal-btns { display: flex; flex-direction: column; gap: 10px; }
  .btn-confirm {
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .btn-cancel {
    padding: 14px;
    background: var(--bg2);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>GYM split</h1>
    </div>
    <div class="header-date" id="todayDate"></div>
  </div>

  <div class="day-tabs" id="dayTabs"></div>

  <div class="session-bar">
    <div class="session-info">Última sessão: <strong id="lastSession">—</strong></div>
    <button class="log-btn" onclick="openModal()">Registar sessão</button>
  </div>

  <div class="scroll-area" id="scrollArea">
    <div id="exerciseList"></div>
    <div class="history-wrap">
      <div class="history-title">Histórico de cargas</div>
      <div id="historyList"></div>
    </div>
    <div class="bottom-space"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h3>Registar sessão?</h3>
    <p>As cargas actuais ficam guardadas no histórico para acompanhares a tua evolução.</p>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="confirmLog()">Confirmar treino ✓</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  {
    id: 'push', label: 'Dia 1 — Push',
    groups: [
      { name: 'Peito', exercises: [
        { id: 'vcp', name: 'Vertical Machine Chest Press', weight: 41, step: 1 },
        { id: 'ism', name: 'Incline Smith Machine', weight: 15, step: 1 },
        { id: 'ped', name: 'Pec Deck', weight: 30, step: 1 },
      ]},
      { name: 'Ombros', exercises: [
        { id: 'shp', name: 'Shoulder Press', weight: 17.5, step: 0.5 },
        { id: 'clr', name: 'Cable Lateral Raise', weight: 14, step: 1 },
        { id: 'swp', name: 'Shoulder com peso', weight: 7.5, step: 0.5 },
      ]},
      { name: 'Tríceps', exercises: [
        { id: 'tpn', name: 'Triceps Pressdown (neutral)', weight: 45, step: 1 },
        { id: 'oce', name: 'Overhead Cable Ext. (V)', weight: 35, step: 1 },
        { id: 'tex', name: 'Tricep Extension (corda)', weight: 41, step: 1 },
      ]},
    ]
  },
  {
    id: 'pull', label: 'Dia 2 — Pull',
    groups: [
      { name: 'Costas', exercises: [
        { id: 'wlp', name: 'Wide-grip Lat Pulldowns', weight: 36, step: 1 },
        { id: 'prn', name: 'Pulley Row (narrow)', weight: 50, step: 1 },
        { id: 'rpd', name: 'Reverse Peck Deck', weight: 32, step: 1 },
        { id: 'pbw', name: 'Para Baixo Wi (wide)', weight: 22.5, step: 0.5 },
      ]},
      { name: 'Bíceps', exercises: [
        { id: 'fbc', name: 'Face Away Bayesian Curl', weight: 18, step: 1 },
        { id: 'prc', name: 'Preacher Curls', weight: 10, step: 0.5 },
        { id: 'rhc', name: 'Rope Hammer Curls', weight: 36, step: 1 },
        { id: 'wce', name: 'Wrist Curls/Extension', weight: 2.5, step: 0.5 },
      ]},
    ]
  },
  {
    id: 'legs', label: 'Dia 3 — Legs',
    groups: [
      { name: 'Pernas', exercises: [
        { id: 'itr', name: 'Inner Thigh', weight: 50, step: 1 },
        { id: 'otr', name: 'Outer Thigh', weight: 55, step: 1 },
        { id: 'lgp', name: 'Leg Press', weight: 73, step: 2.5 },
        { id: 'lge', name: 'Leg Extensions', weight: 55, step: 1 },
        { id: 'lgc', name: 'Leg Curls', weight: 64, step: 1 },
        { id: 'cla', name: 'Calve Raises', weight: 80, step: 2.5 },
        { id: 'gld', name: 'Glute Drive', weight: 60, step: 5 },
      ]},
      { name: 'Core', exercises: [
        { id: 'plk', name: 'Plank', weight: 0, step: 0 },
        { id: 'ris', name: 'Raise', weight: 0, step: 0 },
        { id: 'cbc', name: 'Cable Crunch', weight: 55, step: 1 },
        { id: 'pwc', name: 'Plate-weighted Crunch', weight: 10, step: 2.5 },
      ]},
    ]
  }
];

let currentDay = 0;
let done = {};

function loadState() {
  try {
    const s = localStorage.getItem('gymSplitV2');
    if (s) {
      const p = JSON.parse(s);
      DAYS.forEach(day => day.groups.forEach(g => g.exercises.forEach(ex => {
        if (p.weights && p.weights[ex.id] !== undefined) ex.weight = p.weights[ex.id];
      })));
      return p;
    }
  } catch(e) {}
  return { sessions: [], weights: {} };
}

function saveWeights() {
  const w = {};
  DAYS.forEach(d => d.groups.forEach(g => g.exercises.forEach(ex => { w[ex.id] = ex.weight; })));
  state.weights = w;
  try { localStorage.setItem('gymSplitV2', JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function fmtW(w) {
  return w % 1 === 0 ? String(w) : w.toFixed(1);
}

function getExById(id) {
  for (const d of DAYS) for (const g of d.groups) for (const ex of g.exercises) if (ex.id === id) return ex;
}

function getLastSession() {
  return (state.sessions || []).filter(s => s.day === DAYS[currentDay].id)
    .sort((a,b) => new Date(b.date)-new Date(a.date))[0] || null;
}

function getPrevTwo() {
  return (state.sessions || []).filter(s => s.day === DAYS[currentDay].id)
    .sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0, 2);
}

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS.map((d,i) =>
    `<button class="day-btn${i===currentDay?' active':''}" onclick="switchDay(${i})">${d.label}</button>`
  ).join('');
}

function renderLastSession() {
  const last = getLastSession();
  document.getElementById('lastSession').textContent = last ? fmtDate(last.date) : '—';
}

function renderExercises() {
  const day = DAYS[currentDay];
  const prev = getPrevTwo();
  const lastS = prev[0];
  let html = '';

  day.groups.forEach(g => {
    html += `<div class="group-header">${g.name}</div>`;
    g.exercises.forEach(ex => {
      const isDone = !!done[ex.id];
      const prevW = lastS && lastS.exercises && lastS.exercises[ex.id] !== undefined ? lastS.exercises[ex.id] : null;
      let prevHtml = 'Sem histórico';
      if (prevW !== null) {
        const diff = parseFloat((ex.weight - prevW).toFixed(2));
        let badge = '';
        if (diff > 0) badge = `<span class="badge-up">▲${fmtW(diff)}kg</span>`;
        else if (diff < 0) badge = `<span class="badge-down">▼${fmtW(Math.abs(diff))}kg</span>`;
        prevHtml = `Anterior: ${fmtW(prevW)}kg ${badge}`;
      }

      const checkInner = `
        <svg class="check-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polyline points="2.5,7 5.5,10 11.5,4" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="check-circle" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <circle cx="5" cy="5" r="4" stroke="var(--text3)" stroke-width="1.2"/>
        </svg>`;

      const isBody = ex.step === 0;
      const weightHtml = isBody
        ? `<span class="bodyweight-label">corpo</span>`
        : `<div class="weight-ctrl">
            <button class="w-btn" onclick="adj('${ex.id}',-1)">−</button>
            <div class="weight-val">
              <span class="weight-num">${fmtW(ex.weight)}</span>
              <span class="weight-unit">kg</span>
            </div>
            <button class="w-btn" onclick="adj('${ex.id}',1)">+</button>
          </div>`;

      html += `<div class="exercise-row${isDone?' is-done':''}" id="row-${ex.id}">
        <button class="check-btn${isDone?' done':''}" onclick="toggleDone('${ex.id}')">${checkInner}</button>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-prev">${prevHtml}</div>
        </div>
        ${weightHtml}
      </div>`;
    });
  });

  document.getElementById('exerciseList').innerHTML = html;
}

function renderHistory() {
  const prev = getPrevTwo();
  if (!prev.length) {
    document.getElementById('historyList').innerHTML = '<div class="hist-empty">Sem sessões registadas ainda</div>';
    return;
  }
  const day = DAYS[currentDay];
  const allEx = [];
  day.groups.forEach(g => g.exercises.forEach(ex => { if (ex.step > 0) allEx.push(ex); }));

  const last = prev[0];
  const before = prev[1];
  let html = '';

  allEx.forEach(ex => {
    if (!last.exercises || last.exercises[ex.id] === undefined) return;
    const cur = last.exercises[ex.id];
    const old = before && before.exercises && before.exercises[ex.id] !== undefined ? before.exercises[ex.id] : null;
    const improved = old !== null && cur > old;
    html += `<div class="hist-row">
      <span class="hist-name">${ex.name}</span>
      <div class="hist-vals">
        ${old !== null ? `<span class="hist-w">${fmtW(old)}kg</span><span class="hist-arrow">→</span>` : ''}
        <span class="hist-w${improved?' improved':''}">${fmtW(cur)}kg</span>
      </div>
    </div>`;
  });

  document.getElementById('historyList').innerHTML = html || '<div class="hist-empty">Sem dados</div>';
}

function render() {
  renderTabs();
  renderLastSession();
  renderExercises();
  renderHistory();
  document.getElementById('scrollArea').scrollTop = 0;
}

function switchDay(i) {
  currentDay = i;
  done = {};
  render();
}

function adj(id, dir) {
  const ex = getExById(id);
  if (!ex || ex.step === 0) return;
  ex.weight = Math.max(0, parseFloat((ex.weight + dir * ex.step).toFixed(2)));
  saveWeights();
  // update just the weight display inline for speed
  const row = document.getElementById('row-' + id);
  if (row) {
    const num = row.querySelector('.weight-num');
    if (num) num.textContent = fmtW(ex.weight);
    // update prev badge
    renderExercises();
    renderHistory();
  }
}

function toggleDone(id) {
  done[id] = !done[id];
  const row = document.getElementById('row-' + id);
  const btn = row ? row.querySelector('.check-btn') : null;
  if (row) row.classList.toggle('is-done', done[id]);
  if (btn) btn.classList.toggle('done', done[id]);
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function confirmLog() {
  closeModal();
  const day = DAYS[currentDay];
  const exercises = {};
  day.groups.forEach(g => g.exercises.forEach(ex => { exercises[ex.id] = ex.weight; }));
  if (!state.sessions) state.sessions = [];
  state.sessions.push({ date: new Date().toISOString(), day: day.id, exercises });
  saveWeights();
  done = {};
  render();
  showToast('Sessão registada! 💪');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' });
render();
</script>
</body>
</html>
